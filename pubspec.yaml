name: asmita
description: Privacy-first, offline-first women's health companion for Indian users.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  go_router: ^13.2.0
  sqflite: ^2.3.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.1.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  permission_handler: ^11.3.1
  intl: ^0.20.2
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  geolocator: ^11.0.0
  http: ^1.2.0
  camera: ^0.10.5+9
  image: ^4.1.3
  record: ^6.2.0
  share_plus: ^10.0.3
  connectivity_plus: ^6.0.3
  tflite_flutter: ^0.12.1
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.6
  llama_flutter_android: 0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/menstruation/
    - assets/audio/follicular/
    - assets/audio/ovulation/
    - assets/audio/luteal/
    - assets/models/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic-VariableFont_wght.ttf
          style: italic
